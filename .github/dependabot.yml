version: 2
updates:
  - package-ecosystem: pip
    directory: /app
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    ignore:
      - dependency-name: asgiref
        versions:
          - 3.3.4
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    ignore:
      # We track stable Python only — not alpha/beta/rc pre-releases.
      # (Dependabot once bumped the base image onto a 3.15 pre-release, which
      # gave the misleading impression we wanted pre-releases. We don't.)
      # Mirrors the rule in lucos_media_import. If the normalised form below
      # fails to match silently, fall back to per-series range syntax.
      - dependency-name: "python"
        versions:
          - "*.pre.a"   # alpha
          - "*.pre.b"   # beta
          - "*.pre.rc*" # release candidate
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
