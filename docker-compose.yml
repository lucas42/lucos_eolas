services:
  web:
    build: ./web
    container_name: lucos_eolas_web
    ports:
      - $PORT:80
    image: lucas42/lucos_eolas_web
    volumes:
      - "staticfiles:/usr/share/nginx/html/resources"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - app
  app:
    build: ./app
    container_name: lucos_eolas_app
    image: lucas42/lucos_eolas_app
    environment:
      - SECRET_KEY
      - CLIENT_KEYS
      - LOGANNE_ENDPOINT
      - POSTGRES_PASSWORD
      - AUTH_ORIGIN=https://auth.l42.eu
      - ENVIRONMENT
      - APP_ORIGIN
      - SYSTEM
    volumes:
      - "staticfiles:/usr/src/app/lucos_eolas/static"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - db
  db:
    container_name: lucos_eolas_db
    image: postgres:17-alpine
    volumes:
      - db_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_PASSWORD
    restart: always
volumes:
  staticfiles:
  db_data: