services:
  web:
    build: ./web
    container_name: lucos_eolas_web
    ports:
      - $PORT:80
    image: lucas42/lucos_eolas_web:${VERSION:-latest}
    volumes:
      - "staticfiles:/usr/share/nginx/html/resources"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      app:
        condition: service_healthy
  app:
    build: ./app
    container_name: lucos_eolas_app
    image: lucas42/lucos_eolas_app:${VERSION:-latest}
    environment:
      - SECRET_KEY
      - CLIENT_KEYS
      - LOGANNE_ENDPOINT
      - POSTGRES_PASSWORD
      - AUTH_ORIGIN=https://auth.l42.eu
      - ENVIRONMENT
      - APP_ORIGIN
      - SYSTEM
    volumes:
      - "staticfiles:/usr/src/app/lucos_eolas/static"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
  db:
    container_name: lucos_eolas_db
    image: postgres:17-alpine
    volumes:
      - db_data:/var/lib/postgresql/data/
    environment:
      # Production uses the real POSTGRES_PASSWORD from .env.
      # CI/test falls back to the hardcoded "test" password (matches POSTGRES_PASSWORD in the test service).
      # Any change to the DATABASES PASSWORD field in settings.py requires
      # manual validation in production before shipping.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-test}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
  test:
    build: ./app
    container_name: lucos_eolas_test
    image: lucas42/lucos_eolas_app:${VERSION:-latest}
    environment:
      - SECRET_KEY=test
      - CLIENT_KEYS=test=key
      - APP_ORIGIN=http://localhost
      - AUTH_ORIGIN=http://localhost
      - LOGANNE_ENDPOINT=http://localhost
      - SYSTEM=lucos_eolas
      - ENVIRONMENT=test
      - POSTGRES_PASSWORD=test
    command: python3 manage.py test lucos_eolas.metadata.tests --no-input
    profiles:
      - test
    depends_on:
      db:
        condition: service_healthy
volumes:
  staticfiles:
  db_data: