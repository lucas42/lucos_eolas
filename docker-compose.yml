services:
  web:
    build: ./web
    container_name: lucos_eolas_web
    ports:
      - $PORT:80
    image: lucas42/lucos_eolas_web:${VERSION:-latest}
    volumes:
      - "staticfiles:/usr/share/nginx/html/resources"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      app:
        condition: service_healthy
  app:
    build: ./app
    container_name: lucos_eolas_app
    image: lucas42/lucos_eolas_app:${VERSION:-latest}
    environment:
      - SECRET_KEY
      - CLIENT_KEYS
      - LOGANNE_ENDPOINT
      - POSTGRES_PASSWORD
      - AUTH_ORIGIN=https://auth.l42.eu
      - ENVIRONMENT
      - APP_ORIGIN
      - SYSTEM
    volumes:
      - "staticfiles:/usr/src/app/lucos_eolas/static"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - db
  db:
    container_name: lucos_eolas_db
    image: postgres:17-alpine
    volumes:
      - db_data:/var/lib/postgresql/data/
    environment:
      # NOTE: CI/test uses trust auth — no password required.
      # Production uses password auth (POSTGRES_PASSWORD env var).
      # This mismatch is intentional and known: trust auth in CI means tests
      # will pass even if POSTGRES_PASSWORD is missing from the app config.
      # Any change to the DATABASES PASSWORD field in settings.py requires
      # manual validation in production before shipping.
      - POSTGRES_HOST_AUTH_METHOD=trust
    restart: always
  test:
    build: ./app
    container_name: lucos_eolas_test
    image: lucas42/lucos_eolas_app:${VERSION:-latest}
    environment:
      - SECRET_KEY=test
      - CLIENT_KEYS=test=key
      - APP_ORIGIN=http://localhost
      - AUTH_ORIGIN=http://localhost
      - LOGANNE_ENDPOINT=http://localhost
      - SYSTEM=lucos_eolas
      - ENVIRONMENT=test
    command: python3 manage.py test lucos_eolas.metadata.tests --no-input
    profiles:
      - test
    depends_on:
      - db
volumes:
  staticfiles:
  db_data: